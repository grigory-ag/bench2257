<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BENCH — Профиль</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d1117;
            --border-color: #30363d;
            --accent-blue: #1f6feb;
            --text-main: #e6edf3;
            --text-muted: #848d97;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .nav-brand {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
            color: #fff;
            text-decoration: none;
        }
        .nav-links { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }
        .nav-links a:hover { color: var(--text-main); background-color: #21262d; }
        .nav-links a.active { color: var(--accent-blue); background-color: #21262d; }
        .logout-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            font-family: inherit;
        }
        .logout-btn:hover { background-color: #21262d; border-color: var(--text-muted); }
        .container {
            padding: 32px 30px 48px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
        }
        .section-title {
            margin: 0 0 12px;
            font-size: 18px;
            font-weight: 600;
        }
        .table-wrap { margin-bottom: 28px; }
        h1 { margin: 0 0 8px; font-size: 26px; font-weight: 700; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .nothing { color: var(--text-muted); text-align: center; padding: 48px 20px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }
        th { color: var(--text-muted); font-weight: 600; }
        .time-val { color: #3fb950; font-weight: bold; }
        td.lang-cell { text-transform: uppercase; font-size: 12px; color: #c9d1d9; }
        .view-btn {
            border: none;
            background: var(--accent-blue);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .view-btn:hover { background: #388bfd; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal {
            width: min(980px, 100%);
            max-height: 90vh;
            background: #0b1118;
            border: 1px solid #2f3640;
            border-radius: 12px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #2f3640;
        }
        .modal-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }
        .close-btn {
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .close-btn:hover { background: #1d2530; }
        .code-wrap {
            overflow: auto;
            padding: 0;
            margin: 0;
            flex: 1;
            background: #070b10;
        }
        pre {
            margin: 0;
            padding: 16px;
            color: #c9d1d9;
            font-size: 13px;
            line-height: 1.45;
            white-space: pre;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
    <script src="/js/task-translations.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="nav-brand">BENCH.</a>
        <div class="nav-links">
            <a href="/index.html">Аналитика</a>
            <a href="/leaderboard.html">Рейтинг</a>
            <a href="/dashboard.html">Задачи и Теория</a>
            <a href="/task.html" class="active">Профиль</a>
            <a href="/admin.html" id="adminLink" style="display:none">Админ-панель</a>
            <a href="/index.html" class="logout-btn" id="authLink">Выйти</a>
        </div>
    </nav>
    <div class="container">
        <h1>Мой профиль</h1>
        <p id="page-subtitle" class="subtitle">Ваши запуски бенчмарка по задачам и языкам.</p>
        <div class="box">
            <div id="content"><div class="nothing">Загрузка…</div></div>
        </div>
    </div>
    <div class="modal-overlay" id="code-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Исходный код отправки</h2>
                <button class="close-btn" id="close-modal-btn" type="button">Закрыть</button>
            </div>
            <div class="code-wrap">
                <pre><code id="modal-code"></code></pre>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }
        const modal = document.getElementById("code-modal");
        const modalCode = document.getElementById("modal-code");
        const modalTitle = document.getElementById("modal-title");
        const closeModalBtn = document.getElementById("close-modal-btn");

        const LANG_ORDER = ["python", "cpp", "cuda", "go"];

        function sortRows(rows) {
            return rows.sort(function (a, b) {
                const ta = (a._task || "").localeCompare(b._task || "");
                if (ta !== 0) return ta;
                const la = (a.language || "").localeCompare(b.language || "");
                if (la !== 0) return la;
                return (a.attempt_number || 0) - (b.attempt_number || 0);
            });
        }

        function initNavbar() {
            const adminLink = document.getElementById("adminLink");
            fetch("/auth/me", { headers: { Authorization: "Bearer " + token } })
                .then((res) => (res.ok ? res.json() : null))
                .then((user) => {
                    if (user && user.is_admin === true) {
                        adminLink.style.display = "block";
                    }
                })
                .catch(() => {});
        }

        function closeModal() {
            modal.style.display = "none";
            modalCode.textContent = "";
        }

        async function load() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawTask = urlParams.get("task");
            const taskFilter = rawTask ? rawTask.trim() : "";
            const tasks = taskFilter ? [taskFilter] : ALL_BENCH_TASKS;

            const subtitle = document.getElementById("page-subtitle");
            if (taskFilter) {
                subtitle.textContent = "Отправки по задаче «" + taskTitle(taskFilter) + "» (все языки).";
            } else {
                subtitle.textContent = "Ваши запуски бенчмарка по задачам и языкам.";
            }

            const rows = [];
            const fetches = [];
            for (let i = 0; i < tasks.length; i++) {
                const taskName = tasks[i];
                if (!taskName) continue;
                for (let j = 0; j < LANG_ORDER.length; j++) {
                    const lang = LANG_ORDER[j];
                    const path =
                        "/api/submissions/" +
                        encodeURIComponent(lang) +
                        "/" +
                        encodeURIComponent(taskName);
                    fetches.push(
                        fetch(path, {
                            headers: { Authorization: "Bearer " + token },
                        }).then(function (r) {
                            if (!r.ok) return [];
                            return r.json().then(function (data) {
                                if (!Array.isArray(data)) return [];
                                return data.map(function (s) {
                                    return Object.assign({}, s, { _task: taskName });
                                });
                            });
                        })
                    );
                }
            }
            const chunks = await Promise.all(fetches);
            chunks.forEach(function (part) {
                part.forEach(function (row) {
                    rows.push(row);
                });
            });

            const sorted = sortRows(rows);
            const content = document.getElementById("content");

            if (sorted.length === 0) {
                content.innerHTML =
                    '<div class="nothing">Пока пусто — отправьте решение из клиента бенчмарка.</div>';
                return;
            }

            const official = sorted.filter(function (s) { return s.source_code == null; });
            const custom = sorted.filter(function (s) { return s.source_code != null; });

            let html = "";
            html += '<div class="table-wrap"><h2 class="section-title">Официальные замеры (железо)</h2>';
            html += "<table><thead><tr><th>Задача</th><th>Язык</th><th>Время (мс)</th><th>Процессор</th><th>Видеокарта</th><th>ОЗУ (МБ)</th></tr></thead><tbody>";
            if (official.length === 0) {
                html += '<tr><td colspan="6" class="nothing">Официальных запусков пока нет.</td></tr>';
            } else {
                official.forEach(function (s) {
                    html += "<tr>";
                    html += "<td>" + escapeHtml(taskTitle(s._task || s.task_name)) + "</td>";
                    html += '<td class="lang-cell">' + escapeHtml((s.language || "—").toUpperCase()) + "</td>";
                    html += '<td class="time-val">' + escapeHtml(String(s.time_ms != null ? s.time_ms : "—")) + "</td>";
                    html += "<td>" + escapeHtml(s.cpu_model || "—") + "</td>";
                    html += "<td>" + escapeHtml(s.gpu_model || "—") + "</td>";
                    html +=
                        "<td>" +
                        (s.cpu_max_ram_mb != null
                            ? escapeHtml(String(Math.round(Number(s.cpu_max_ram_mb))))
                            : "—") +
                        "</td>";
                    html += "</tr>";
                });
            }
            html += "</tbody></table></div>";

            html += '<div class="table-wrap"><h2 class="section-title">Пользовательские алгоритмы</h2>';
            html += "<table><thead><tr><th>Задача</th><th>Язык</th><th>Время (мс)</th><th>Статус</th><th>Действие</th></tr></thead><tbody>";
            if (custom.length === 0) {
                html += '<tr><td colspan="5" class="nothing">Кастомных отправок пока нет.</td></tr>';
            } else {
                custom.forEach(function (s, idx) {
                    html += "<tr>";
                    html += "<td>" + escapeHtml(taskTitle(s._task || s.task_name)) + "</td>";
                    html += '<td class="lang-cell">' + escapeHtml((s.language || "—").toUpperCase()) + "</td>";
                    html += '<td class="time-val">' + escapeHtml(String(s.time_ms != null ? s.time_ms : "—")) + "</td>";
                    html += "<td>" + escapeHtml(getSubmissionStatusLabel(s)) + "</td>";
                    html += '<td><button class="view-btn view-code-btn" data-idx="' + idx + '">Код</button></td>';
                    html += "</tr>";
                });
            }
            html += "</tbody></table></div>";
            content.innerHTML = html;

            const buttons = content.querySelectorAll(".view-code-btn");
            buttons.forEach(function (btn) {
                btn.addEventListener("click", function () {
                    const idx = Number(btn.getAttribute("data-idx"));
                    const sub = custom[idx];
                    if (!sub) return;
                    modalTitle.textContent = "Исходный код отправки";
                    modalCode.textContent = sub.source_code || "";
                    modal.style.display = "flex";
                });
            });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function getSubmissionStatusLabel(submission) {
            if (!submission || !submission.source_code) {
                return "принято автоматически";
            }
            const st = submission.status || "pending";
            if (st === "pending") return "на модерации";
            if (st === "approved") return "одобрено";
            if (st === "rejected") return "отклонено";
            return st;
        }

        closeModalBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", function (event) {
            if (event.target === modal) {
                closeModal();
            }
        });
        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape" && modal.style.display === "flex") {
                closeModal();
            }
        });

        document.addEventListener("DOMContentLoaded", function () {
            const authLink = document.getElementById("authLink");
            if (authLink) {
                authLink.addEventListener("click", function (e) {
                    e.preventDefault();
                    localStorage.removeItem("token");
                    window.location.href = "index.html";
                });
            }
            initNavbar();
            load();
        });
    </script>
</body>
</html>
