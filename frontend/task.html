<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bench - Task</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d1117;
            --border-color: #30363d;
            --accent-blue: #1f6feb;
            --text-main: #e6edf3;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0;
        }
        .header {
            padding: 20px 40px; background: var(--card-bg);
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center;
        }
        .back-link { color: var(--accent-blue); text-decoration: none; margin-right: 20px; font-weight: 600; }
        .container { padding: 40px; max-width: 1100px; margin: 0 auto; }
        .box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 30px; }
        .btn-download {
            display: inline-block; background: var(--accent-blue); color: #fff;
            padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600;
        }
        .nothing { color: #848d97; text-align: center; padding: 50px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { color: #848d97; }
        .time-val { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/dashboard.html" class="back-link">← Back</a>
        <h2 id="task-title" style="margin:0"></h2>
    </div>
    <div class="container">
        <div class="box">
            <h3 style="margin-top:0">Archive with codes</h3>
            <p style="color:#848d97; font-size:14px">Contains benchmarking tools, generator and library manager.</p>
            <a href="/api/downloads/archive" class="btn-download">Download Toolkit (.zip)</a>
        </div>
        <div class="box">
            <h3 style="margin-top:0">Your Solutions</h3>
            <div id="content"><div class="nothing">Nothing here yet</div></div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang');
        const task = urlParams.get('task');
        document.getElementById('task-title').innerText = `${lang.toUpperCase()} / ${task}`;

        async function load() {
            const token = localStorage.getItem('token');
            if(!token) { window.location.href='/'; return; }
            let r = await fetch(`/api/submissions/${lang}/${task}`, { headers: {'Authorization': `Bearer ${token}`} });
            if(r.ok) {
                let data = await r.json();
                if(data.length > 0) {
                    let html = `<table><thead><tr><th>Attempt</th><th>Time (ms)</th><th>CPU RAM (MB)</th><th>GPU RAM (MB)</th><th>Hardware</th></tr></thead><tbody>`;
                    data.forEach(s => {
                        html += `<tr>
                            <td>#${s.attempt_number}</td>
                            <td class="time-val">${s.time_ms}</td>
                            <td>${s.cpu_max_ram_mb || '-'}</td>
                            <td>${s.gpu_max_ram_mb || '-'}</td>
                            <td style="font-size:12px; color:#848d97">${s.cpu_model || ''} / ${s.gpu_model || ''}</td>
                        </tr>`;
                    });
                    html += `</tbody></table>`;
                    document.getElementById('content').innerHTML = html;
                }
            }
        }
        load();
    </script>
</body>
</html>
