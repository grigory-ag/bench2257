<!DOCTYPE html>
<html lang="ru">
<head>
    <script>if(localStorage.getItem("token")) { window.location.replace("index.html"); }</script>
    <meta charset="UTF-8">
    <title>BENCH — Вход</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d1117;
            --text-main: #e6edf3;
            --text-muted: #848d97;
            --border-color: #30363d;
            --accent-blue: #1f6feb;
            --accent-hover: #388bfd;
            --danger: #f85149;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .nav-brand {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
            color: #fff;
            text-decoration: none;
        }
        .nav-links { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }
        .nav-links a:hover { color: var(--text-main); background-color: #21262d; }
        #loginNavProfile,
        #loginNavAdmin,
        #loginNavAuth {
            display: none !important;
        }
        .logout-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            font-family: inherit;
        }
        .auth-shell {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .auth-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px; width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-muted); transition: 0.3s; font-size: 14px; }
        .tab.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        input {
            width: 100%; padding: 10px 12px; background-color: #000;
            border: 1px solid var(--border-color); border-radius: 6px;
            color: #fff; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.2); }
        button {
            width: 100%; padding: 12px; background-color: var(--accent-blue);
            color: #fff; border: none; border-radius: 6px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: var(--accent-hover); }
        .msg { margin-top: 15px; font-size: 13px; text-align: center; color: var(--danger); min-height: 18px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/index.html" class="nav-brand">BENCH.</a>
    <div class="nav-links">
        <a href="/about.html">О проекте</a>
        <a href="/index.html">Аналитика</a>
        <a href="/leaderboard.html">Рейтинг</a>
        <a href="/dashboard.html">Задачи и Теория</a>
        <a href="/task.html" id="loginNavProfile">Профиль</a>
        <a href="/admin.html" id="loginNavAdmin">Админ-панель</a>
        <a href="/" class="logout-btn" id="loginNavAuth">Выйти</a>
    </div>
</nav>
<div class="auth-shell">
<div class="auth-container">
    <div class="logo">BENCH.</div>
    <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Вход</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Регистрация</div>
    </div>
    <div class="form-group"><label>Имя пользователя</label><input type="text" id="username"></div>
    <div class="form-group"><label>Пароль</label><input type="password" id="password"></div>
    <div class="form-group" id="confirm-group" style="display: none;"><label>Повтор пароля</label><input type="password" id="confirm_password"></div>
    <button id="action-btn" onclick="handleAuth()">Войти</button>
    <div class="msg" id="msg"></div>
</div>
</div>
<script>
    (function initLoginNavbar() {
        function hidePrivateNav() {
            ["loginNavProfile", "loginNavAdmin", "loginNavAuth"].forEach(function (id) {
                var el = document.getElementById(id);
                if (el) {
                    el.style.display = "none";
                }
            });
        }
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", hidePrivateNav);
        } else {
            hidePrivateNav();
        }
    })();
    let isLogin = true;
    function switchTab(mode) {
        isLogin = (mode === 'login');
        document.getElementById('tab-login').classList.toggle('active', isLogin);
        document.getElementById('tab-register').classList.toggle('active', !isLogin);
        document.getElementById('confirm-group').style.display = isLogin ? 'none' : 'block';
        document.getElementById('action-btn').innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
        document.getElementById('msg').innerText = '';
    }
    async function errorMessageFromResponse(r) {
        let fallback = "Произошла ошибка";
        try {
            const errorData = await r.json();
            if (errorData.detail != null && errorData.detail !== '') {
                if (typeof errorData.detail === 'string') return errorData.detail;
                if (Array.isArray(errorData.detail))
                    return errorData.detail.map(function (e) { return e.msg || ''; }).filter(Boolean).join(' ') || fallback;
                return String(errorData.detail);
            }
        } catch (_) {}
        return fallback;
    }
    async function handleAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('msg');
        msg.style.color = '';
        if (isLogin) {
            const fd = new URLSearchParams(); fd.append('username', user); fd.append('password', pass);
            let r = await fetch('/auth/token', {method:'POST', body:fd});
            if(r.ok){ let d = await r.json(); localStorage.setItem('token', d.access_token); window.location.href='/index.html'; }
            else { msg.innerText = await errorMessageFromResponse(r); }
        } else {
            const cp = document.getElementById('confirm_password').value;
            if(pass !== cp){ msg.innerText = "Пароли не совпадают"; return; }
            const fd = new URLSearchParams(); fd.append('username', user); fd.append('password', pass);
            let r = await fetch('/auth/register', {method:'POST', body:fd});
            if(r.ok){ msg.style.color='#3fb950'; msg.innerText="Готово! Теперь войдите."; switchTab('login'); }
            else { msg.innerText = await errorMessageFromResponse(r); }
        }
    }
</script>
</body>
</html>
