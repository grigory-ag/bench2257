<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bench - Global Analytics</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d1117;
            --border-color: #30363d;
            --accent-blue: #1f6feb;
            --text-main: #e6edf3;
            --text-muted: #848d97;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .nav-brand { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; color: #fff; }
        .nav-links { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }
        .nav-links a:hover { color: var(--text-main); background-color: #21262d; }
        .nav-links a.active { color: var(--accent-blue); background-color: #21262d; }
        .logout-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            font-family: inherit;
        }
        .logout-btn:hover { background-color: #21262d; border-color: var(--text-muted); }
        main {
            flex: 1;
            padding: 24px 30px 40px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { margin: 0 0 8px; font-size: 26px; font-weight: 700; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 24px 28px;
            min-height: 420px;
        }
        .chart-wrap {
            position: relative;
            height: min(70vh, 640px);
            width: 100%;
        }
        #benchmarkChart { display: block; }
        .err, .loading {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 15px;
        }
        .err { color: #f85149; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <span class="nav-brand">BENCH.</span>
        <div class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/analytics.html" class="active">Global Analytics</a>
            <button type="button" class="logout-btn" onclick="localStorage.removeItem('token'); window.location.href='/'">Logout</button>
        </div>
    </nav>
    <main>
        <h1>Global Analytics</h1>
        <p class="subtitle">Average submission time (ms) by task and language — all users</p>
        <div class="chart-card">
            <div id="chart-status" class="loading">Loading data…</div>
            <div class="chart-wrap" id="chart-wrap" style="display:none">
                <canvas id="benchmarkChart"></canvas>
            </div>
        </div>
    </main>
    <script>
        const LANG_ORDER = ['python', 'cpp', 'cuda', 'go'];
        const LANG_COLORS = {
            python: 'rgba(210, 153, 34, 0.85)',
            cpp: 'rgba(88, 166, 255, 0.85)',
            cuda: 'rgba(63, 185, 80, 0.85)',
            go: 'rgba(121, 192, 255, 0.85)',
        };
        const LANG_BORDER = {
            python: '#d29922',
            cpp: '#58a6ff',
            cuda: '#3fb950',
            go: '#79c0ff',
        };
        const LANG_LABEL = {
            python: 'Python',
            cpp: 'C++',
            cuda: 'CUDA',
            go: 'Go',
        };

        function buildChart(rows) {
            const tasks = [...new Set(rows.map((r) => r.task_name))].sort();
            const byTask = {};
            rows.forEach((r) => {
                const t = r.task_name;
                const lang = (r.language || '').toLowerCase();
                if (!byTask[t]) byTask[t] = {};
                byTask[t][lang] = Number(r.avg_time_ms);
            });

            const datasets = LANG_ORDER.map((lang) => ({
                label: LANG_LABEL[lang] || lang,
                data: tasks.map((t) => (byTask[t][lang] != null ? byTask[t][lang] : null)),
                backgroundColor: LANG_COLORS[lang],
                borderColor: LANG_BORDER[lang],
                borderWidth: 1,
            }));

            const tickStyle = { color: '#c9d1d9' };
            const gridStyle = { color: '#30363d' };

            const ctx = document.getElementById('benchmarkChart').getContext('2d');
            return new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: tasks,
                    datasets,
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: '#e6edf3',
                                padding: 16,
                                font: { size: 13, family: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' },
                                usePointStyle: true,
                                pointStyle: 'rect',
                            },
                        },
                        tooltip: {
                            backgroundColor: '#161b22',
                            titleColor: '#e6edf3',
                            bodyColor: '#c9d1d9',
                            borderColor: '#30363d',
                            borderWidth: 1,
                            callbacks: {
                                label(ctx) {
                                    const v = ctx.raw;
                                    if (v == null) return `${ctx.dataset.label}: —`;
                                    return `${ctx.dataset.label}: ${v.toFixed(2)} ms`;
                                },
                            },
                        },
                    },
                    scales: {
                        x: {
                            stacked: false,
                            ticks: { ...tickStyle, maxRotation: 35, minRotation: 0 },
                            grid: { color: gridStyle.color },
                            title: {
                                display: true,
                                text: 'Task',
                                color: '#848d97',
                                font: { size: 12 },
                            },
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { ...tickStyle },
                            grid: { color: gridStyle.color },
                            title: {
                                display: true,
                                text: 'Average time (ms)',
                                color: '#848d97',
                                font: { size: 12 },
                            },
                        },
                    },
                },
            });
        }

        (async function init() {
            const status = document.getElementById('chart-status');
            const wrap = document.getElementById('chart-wrap');

            try {
                const res = await fetch('/api/analytics/global');
                if (!res.ok) {
                    status.textContent = 'Failed to load analytics (' + res.status + ')';
                    status.className = 'err';
                    return;
                }
                const rows = await res.json();
                if (!Array.isArray(rows) || rows.length === 0) {
                    status.textContent = 'No submission data yet.';
                    status.className = 'loading';
                    return;
                }
                status.style.display = 'none';
                wrap.style.display = 'block';
                buildChart(rows);
            } catch (e) {
                status.textContent = 'Network error while loading analytics.';
                status.className = 'err';
            }
        })();
    </script>
</body>
</html>
